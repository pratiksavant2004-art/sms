<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Swaroop Agrochemical</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <div class="header">
                <h1>Swaroop Agrochemical Industries</h1>
                <p>Authorized Personnel Management System</p>
            </div>
            
            <div class="form-card">
                <h2>User Login</h2>
                
                {% if error %}
                <div class="error-message">{{ error }}</div>
                {% endif %}
                
                {% if request.args.get('success') %}
                <div class="success-message">{{ request.args.get('success') }}</div>
                {% endif %}
                
                <form method="POST">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Log In</button>
                </form>
                
                <div class="form-footer">
                    <p>Don't have an account? <a href="/register">Register Here</a></p>
                    <p><a href="/admin/login">Admin Login</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
